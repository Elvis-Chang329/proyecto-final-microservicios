services:
  frontend:
    build:
      context: ./frontend-angular
    container_name: pf_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      postgres:
        condition: service_healthy
      mysql:
        condition: service_healthy
      ms-usuarios:
        condition: service_started
      ms-inventario:
        condition: service_started

  ms-usuarios:
    build:
      context: ./services/ms-usuarios
    container_name: pf_ms_usuarios
    restart: unless-stopped
    environment:
      PORT: 3001
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: usuarios_db
      PGUSER: postgres
      PGPASSWORD: postgres
      JWT_SECRET: super_secreto_cambiar
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  ms-inventario:
    build:
      context: ./services/ms-inventario
    container_name: pf_ms_inventario
    restart: unless-stopped
    environment:
      PORT: 3002
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: inventario_db
      MYSQL_USER: root
      MYSQL_PASSWORD: root
    ports:
      - "3002:3002"
    depends_on:
      mysql:
        condition: service_healthy

  postgres:
    image: postgres:16
    container_name: pf_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: usuarios_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./services/ms-usuarios/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d usuarios_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  mysql:
    image: mysql:8.0
    container_name: pf_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: inventario_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./services/ms-inventario/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -proot --silent"]
      interval: 10s
      timeout: 5s
      retries: 15

  adminer:
    image: adminer:latest
    container_name: pf_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres
      - mysql

volumes:
  pg_data:
  mysql_data:
